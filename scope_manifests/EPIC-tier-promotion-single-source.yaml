codex_review: 2026-05-14 (10 결정점 + Researcher↔PMO 충돌 1건 해소)

motivation: |
  MCT-156/162/160 3-cycle 누적 실패 패턴 ("review lane PASS vs production 실측 결함") 의
  근본 원인 = local-NAS dual-storage ambiguity. NAS = single source of truth 전환으로
  ambiguity 차단 + production evidence direct surface.

  추가: codeforge-plugin#620 post-mortem Issue 의 R1-R5 fix-1~5 plugin-level 개선과
  병렬 진행. 본 Epic 의 D10 invariant violation enforcement 가 plugin Fix-1 (production
  evidence gate) 의 mctrader-consumer 측 implementation.

design_decisions:
  D1:
    decision: "L1 NAS PUT timing = L1 ParquetWriter atomic 직후 (compactor 측)"
    option_chosen: B
    rationale: "파일 단위 정합성 + hot path 지연 균형, sealed segment 가 D4 mitigation"
    owner_story: MCT-168
  D2:
    decision: "NAS PUT 동기/비동기 = 기존 DualWriter retry_queue + local_only 재사용"
    option_chosen: B
    rationale: "hot path block 최소 + MCT-150/151 primitive 재사용 (logical sync)"
    owner_story: MCT-168
  D3:
    decision: "Local delete = NAS HEAD verify + grace 0 (immediate after verify)"
    option_chosen: C
    rationale: "Researcher↔PMO 충돌 해소: version/etag 검증으로 24h grace 대체, ambiguity 즉시 차단"
    owner_story: MCT-169
  D4:
    decision: "WAL sealed segment = local only 유지 (사용자 directive 3)"
    option_chosen: B
    rationale: "사용자 directive 2026-05-14: WAL local 유지. RPO=0 보장은 D1 (L1 ParquetWriter atomic 직후 NAS PUT) 단독 의존"
    owner_story: MCT-171
    note: "Codex 원 권고 = C (sealed NAS PUT). 사용자 directive 로 B 채택. WAL local fail 시 sealed→L1 derive fail risk = D11 용량 제한 정책 + collector ingest block (D5) 으로 mitigation"
  D5:
    decision: "NAS unreachable 시 collector ingest block (capacity-bounded)"
    option_chosen: A_modified
    rationale: "RPO=0 우선 + D11 용량 제한 임계 도달 시점에만 block. 정상 운영 시 hot path 영향 0"
    owner_story: MCT-171
  D6:
    decision: "NAS replication = bucket versioning + cross-NAS replication (2nd NAS box)"
    option_chosen: B
    rationale: "single NAS 장애 + overwrite/delete 실수 동시 완화"
    owner_story: MCT-171 (MCT-161 prerequisite)
  D7:
    decision: "Reader cache = 95% hit + <100ms p99 (aggressive cache)"
    option_chosen: A
    rationale: "NAS 우선 reader 의 hot path 체감 지연 억제"
    owner_story: MCT-170
  D8:
    decision: "기존 local data migration = forward-only + local fallback (migration window 동안)"
    option_chosen: B
    rationale: "bulk 전환 risk 회피, 점진적 전환"
    owner_story: MCT-170 (engine reader)
  D9:
    decision: "MCT-161 + MCT-163 prerequisite = 둘 다 LAND 후 본 Epic 진입 (sequential)"
    option_chosen: A
    rationale: "versioning + streaming 전제 완성 후 시작 = 재설계 비용 < 일정 cost"
    owner_story: epic-level
  D10:
    decision: "ambiguity 차단 = invariant violation enforcement (NAS+local 동시 존재 = violation)"
    option_chosen: A
    rationale: "차단이 설계가 아닌 보증 (codeforge-plugin#620 Fix-1 의 production evidence gate 정합)"
    owner_story: MCT-169 (invariant test) + MCT-172 (cross-Story verify)
  D11:
    decision: "용량 제한 정책 — 사용자 directive 1번 (4 layer 임계)"
    option_chosen: capacity_bounded
    rationale: |
      사용자 directive 2026-05-14: D5 ingest block 의 mitigation = 용량 선 기반 제한
    layers:
      WAL_local:
        hard_limit: 30 GiB
        threshold_action: collector ingest block (D5 정합)
        rationale: "NAS 무한 장애 시에만 block, 정상 운영 시 hot path 영향 0"
      L1_local:
        hard_limit: 20 GiB
        threshold_action: oldest L1 FIFO delete after NAS verify (D3=C 정합, 7-day grace 기본)
        rationale: "raw_json large column 대형 (orderbooksnapshot 9.5G/3day), 7-day rolling cleanup"
      NAS_bucket:
        target: 500 GiB
        hard_limit: 1 TiB
        threshold_action: "L3 (oldest 30day+) cold archive 이전 (별 Story or 외부 cloud)"
        rationale: "L3 daily archive forward 누적, 30day+ archive tier 후보"
      Host_disk:
        hard_limit: 200 GiB (사용자 환경 — Host C: 476G 의 ~42%)
        threshold_action: alert + manual cleanup
        rationale: "host disk pressure mitigation, mctrader 외 다른 영역과 공유"
    owner_story: MCT-171


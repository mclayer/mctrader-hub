risks:
  R1:
    severity: HIGH
    desc: "L1 NAS PUT latency 가 compactor throughput 영향 (50 sym × 3 channel × 12 seg/h ≈ 30 PUT/min)"
    mitigation: "MCT-163 DualWriter streaming prerequisite + MCT-148 T2 baseline ±15% gate"
    owner_story: MCT-168
  R2:
    severity: HIGH
    desc: "NAS unreachable 시 ingest block 정책 (D5) = 시장 실시간 데이터 손실 risk"
    mitigation: "D11 capacity-bounded (WAL 30G 도달 시에만 block) + D6 cross-NAS replication"
    owner_story: MCT-171
  R3:
    severity: MEDIUM
    desc: "WAL local only (D4=B 사용자 directive) = sealed→L1 derive fail 시 RPO ≠ 0"
    mitigation: "D5 ingest block + WAL 30G hard limit + Grafana alert"
    owner_story: MCT-171
  R4:
    severity: MEDIUM
    desc: "Local delete (D3=C) version/etag 검증 false delete risk (NAS HEAD eventual consistency)"
    mitigation: "etag exact match + sha256 verify + retry on NoSuchKey"
    owner_story: MCT-169
  R5:
    severity: LOW
    desc: "MCT-154 engine reader 재구현 (MCT-170) = latency baseline 재측정 의무"
    mitigation: "MCT-148 T2 baseline ±15% gate"
    owner_story: MCT-170


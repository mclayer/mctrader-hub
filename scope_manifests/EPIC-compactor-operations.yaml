design_decisions:
  D1:
    decision: "orderbookdepth = 신규 schema 정의 (옵션 D)"
    binding: "ADR-009 §D11.9 신규 amendment + §D2.6 matrix row 추가"
    rationale: "WAL payload = delta `changes` event, transaction (flat trade) / orderbooksnapshot (per-level snapshot) 와 schema mismatch. 별 schema_version namespace 의무. WAL sample fetch (3-line NDJSON) 로 정확 schema 추론."
    owner_story: MCT-162
    addressed_in: [MCT-162]
    triggers_adr_amendment:
      mandatory: true
      trigger_story: MCT-162
      sections: ["§D11.9 NEW", "§D2.6 matrix row"]
  D7:
    decision: "ADR-027 D4 amendment — channel parity 정책 + fail-fast"
    binding: "ADR-027 D4 amendment append"
    rationale: "silent skip catastrophe 차단 invariant. unsupported channel = NotImplementedError + Prometheus emit obligation. cardinality bounded low (collector emit channel 종류만). 3-step 신규 channel 추가 절차 박제."
    owner_story: MCT-162
    addressed_in: [MCT-162]
    triggers_adr_amendment:
      mandatory: true
      trigger_story: MCT-162
      sections: [D4]
  D4:
    decision: "compactor read-only diagnostic mode preflight"
    binding: "Story §6 D9 + Phase 2 task 0"
    rationale: "fix 전 정지 — RPO=0 정합 (collector / ingester / WAL append-only 정상 운영, compactor 만 정지). docker compose stop compactor 단일 명령."
    owner_story: MCT-162
    addressed_in: [MCT-162]
  D2:
    decision: "L2Compactor compact_hour partition-level latest date lookup"
    binding: "구현 (l2.py)"
    rationale: "hour_utc=now strftime 하드코딩 제거 (KST→UTC date roll 시 어제 date L1 결과 hit 0 → silent return None). partition glob 으로 최신 date discover."
    owner_story: MCT-160
    addressed_in: [MCT-160]
  D3:
    decision: "L2 streaming write — pa.concat_tables 제거, ParquetWriter.write_table per-file loop"
    binding: "구현 (l2.py)"
    rationale: "concat 후 sort_by 단일 buffer 32GB peak 차단. raw_json large_string column 누적 i32 offset overflow (4GB) 차단. memory 일정."
    owner_story: MCT-160
    addressed_in: [MCT-160]
  D5:
    decision: "L1 backlog 79k 자연 drainage"
    binding: "epic_close_gate"
    rationale: "MCT-162 (orderbookdepth fast-fail 해소) + MCT-160 (L2 OOM 해소) land 후 compactor 정상 cadence 회복 → 자연 drainage. active batch cleanup 0."
    owner_story: MCT-160
    addressed_in: [MCT-160]
  D6:
    decision: "MCT-159 (L2/L3 8.85 GiB migration) 별 Story 유지"
    binding: "scope 분리 (EPIC-cold-tier-stage-3-wiring 소속)"
    rationale: "MCT-159 = backlog migration scope, MCT-160 = L2 cadence + OOM root fix scope. 분리 유지. cross-epic dependency 0."
    owner_story: MCT-159 (external)
    addressed_in: [MCT-159]
  D8:
    decision: "별 ADR-XXX 신규 — object store durability/versioning"
    binding: "ADR-XXX 신규 (MCT-161 Phase 1)"
    rationale: "MCT-153 backfill 4.2 GiB / 1370 obj NAS 손실 (bucket versioning 미활성) 재발 방지. bucket versioning + replication SSOT 별 ADR 필요 (ADR-027 amendment 만으로 부족 — 정책 영역)."
    owner_story: MCT-161
    addressed_in: [MCT-161]
  R-EXTRA:
    decision: "_dispatch_dual_write read_bytes memory 재할당 fix"
    binding: "구현 (runner.py + dual_writer.py)"
    rationale: "DualWriter.write data=Path streaming. Path object → bytes read 시점 lazy (sha256 single-pass, NAS PUT 시점만 read). OOM 보조 원인 차단."
    owner_story: MCT-160
    addressed_in: [MCT-160]

risks:
  R1:
    severity: HIGH
    description: "L1 backlog 진행 중 자라며 cleanup 시 OOM 재발 — Story-2 진입 시점 L1 backlog 가 OOM 임계 초과 가능"
    mitigation: "D4 preflight (MCT-162 Phase 2 진입 직전 compactor stop) + D3 streaming write (MCT-160) + D2 partition lookup (MCT-160) 결합. MCT-162 land 만으로 L1 backlog drainage 시작 (orderbookdepth fast-fail 해소 → 정상 처리 회복)."
    owner_story: MCT-160
    addressed_in: [MCT-162, MCT-160]
  R2:
    severity: MEDIUM
    description: "drainage 속도 < 유입 속도 — MCT-160 land 후에도 L1 backlog ≤ 1000 미달 가능"
    mitigation: "epic_close_gate verify (≤ 1000) + 부족 시 batch size 조정 또는 별 cleanup batch Story 발의 (MCT-160 retro 시 surface)."
    owner_story: MCT-160
    addressed_in: [MCT-160]
  R3:
    severity: MEDIUM
    description: "ADR-XXX 발의 timeline 지연 — Story-3 까지 NAS bucket versioning 미적용 시점에 추가 손실 발생 가능"
    mitigation: "Story-3 진입 시 ADR-XXX 신규 author + versioning enable 동시 land. MCT-160 land 후 즉시 진입 (sequential 의무)."
    owner_story: MCT-161
    addressed_in: [MCT-161]
  R4:
    severity: HIGH
    description: "upbit L1 partition 0 별 root cause 미진단 — orderbookdepth allowlist 와 무관 (upbit emit `transaction` + `orderbooksnapshot` only, `orderbookdepth` 0)"
    mitigation: "MCT-162 Phase 1 에 surface 박제 (Story §6 D9 운영 risk) + ADR-027 D4 amendment out-of-scope 명시. MCT-160 Phase 1 진단 의무 또는 별 Story 발의 결정 — MCT-162 retro 시 별 Story 발의 판단 의무."
    owner_story: MCT-160 (or new story)
    addressed_in: [MCT-162-Phase1-surface]
  R5:
    severity: MEDIUM
    description: "Prometheus counter `compactor_unsupported_channel_total{channel}` cardinality 폭증 risk — attacker 또는 malformed input 으로 임의 channel 명 injection"
    mitigation: "label `channel` source = L1Compactor `_schema_version(channel)` 호출 path 의 channel 인자 only. caller = `compact_segment` 의 segment metadata 추출 (collector emit channel name SSOT). attacker-controlled injection path 0 = bounded low cardinality 유지. SecurityArch 7.3 박제."
    owner_story: MCT-162
    addressed_in: [MCT-162]
  R6:
    severity: LOW
    description: "L2 layer 의 `orderbook_depth.v1` partition path 미정 — 본 MCT-162 = L1 partition 만 박제, L2 partition layout 은 MCT-160 author scope"
    mitigation: "MCT-162 Phase 2 = L1 partition only (`market/orderbookdepth/schema_version=orderbook_depth.v1/tier=L1/...`). MCT-160 Phase 1 Architect 에 L2 partition layout author 의무 박제 (`tier=L2/.../date=D/hour=HH/node=MERGED/` 정합)."
    owner_story: MCT-160
    addressed_in: [MCT-160]


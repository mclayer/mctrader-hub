planned_adrs:
  amendments:
    - adr: ADR-009-ohlcv-schema
      sections: ["Amendment History", "§D11.9 (NEW)", "§D2.6 (matrix row 추가)"]
      owner_story: MCT-162
      rationale: |
        §D11.9 신규 — `orderbook_depth.v1` schema 정의 (bithumb `orderbookdepth` WS channel delta `changes` payload).
          per-level flat row 11 column (ts_utc / received_at / exchange / symbol / side / price / quantity / raw_json / node_id / collector_run_id / ingest_seq).
          `raw_json` column **`large_string` (LargeUtf8) 의무** (L2 i32 offset overflow 차단, MCT-156 OOM 사례 cross-ref).
          §D11.8 동형 active-active HA dedup logical key 8-tuple.
          §D11.9.7 fail-closed channel parity invariant (ADR-027 D4 amendment dual-binding).
        §D2.6 amendment — `ADR009_CHANNEL_SCHEMA_MATRIX` SSOT 표에 `orderbook_depth.v1` row 추가 (column_count=11). MCT-159 FIX Iter 1 InvariantHarness channel-aware lookup 자동 적용.
        Amendment History entry append (2026-05-13 MCT-162).
    - adr: ADR-027-cold-tier-object-storage-nas-minio
      sections: [D4]
      owner_story: MCT-162
      rationale: |
        D4 (cutover 전략) amendment trail append — channel parity 정책 + fail-fast invariant 박제.
          (1) 모든 collector emit channel 은 L1/L2/L3 layer parity 의무
          (2) unsupported channel = `NotImplementedError` raise + Prometheus `compactor_unsupported_channel_total{channel}` Counter +1 emit (silent skip 금지)
          (3) cardinality risk = bounded low (collector emit channel 종류만, attacker-controlled label injection 0)
          (4) 신규 channel 추가 3-step 절차 (ADR-009 schema → L1Compactor allowlist + converter → integration test)
          (5) fail-fast 의도 = silent skip catastrophe (MCT-156 deploy 후 48,629 sealed silent backlog 누적) 재발 방지
          (6) MCT-162 Phase 2 scope = `orderbookdepth → orderbook_depth.v1` allowlist + converter + large_string cast
          out-of-scope = upbit L1 partition 0 별 root cause (MCT-160 또는 별 Story 진단 의무) + L1 backlog drainage (자연 drainage 의존) + L2 OOM fix (MCT-160 scope)
    - adr: ADR-027-cold-tier-object-storage-nas-minio
      sections: ["silent-skip 차단 amendment append (caller-explicit date + post-write monotonic verify + quarantine 정책)"]
      owner_story: MCT-160
      rationale: |
        MCT-160 D10 채택 (Codex GPT-5 + Sonnet 합성, 사용자 OK 2026-05-13). MCT-162 의 D4 amendment (channel parity fail-fast) 의 sibling — cadence path 의 silent skip 차단 박제:
          (1) `_run_l2` / `_run_l3` 가 partition-level latest date discover 후 `compact_hour(date_utc=...)` / `compact_day(date_utc=...)` 명시 전달 의무 (now=datetime.utcnow() 하드코딩 폐기)
          (2) L2/L3 산출물 post-write monotonic verify 의무 (`ts_utc` non-decreasing) — 위반 시 quarantine isolate + `compactor_quarantine_total{tier,reason}` Counter +1 emit
          (3) quarantine 산출물 자동 retry 0, 운영자 manual review 의무
          (4) silent skip catastrophe (MCT-156 post-deploy bucket 463 obj = bithumb orderbooksnapshot only) 재발 방지
    - adr: ADR-009-ohlcv-schema
      sections: ["nullability discipline 3 schema amendment (transaction + orderbooksnapshot + orderbookdepth)", "Amendment History"]
      owner_story: MCT-160
      rationale: |
        MCT-160 D7+D10 채택 (P1 nullability finding MCT-162 CodeReviewPL surface 합병). 3 schema 일관 `pa.field(name, type, nullable=False/True)` 명시 의무:
          - nullable=False 의무 column = `ts_utc` / `exchange` / `symbol` (3 schema 공통) + `side` / `price` / `quantity` (orderbook 2 schema)
          - nullable=True 허용 column = `raw_json` / `node_id` / `collector_run_id` (metadata)
          - malformed frame 검증 — `if side is None or price is None or quantity is None: raise ValueError + compactor_malformed_frame_total{channel,exchange} Counter +1`
          - MCT-159 FIX Iter 1 InvariantHarness channel-aware lookup 자동 적용 (column count + nullability invariant 박제)
          - Amendment History entry append (2026-05-13 MCT-160)
  new_proposals: []  # 본 Epic 의 신규 ADR 0 — 기존 ADR-009 / ADR-027 amendment only (MCT-160 amendment 추가 2건, MCT-161 = 신규 ADR-XXX 예약)


  MCT-156 (EPIC-cold-tier-stage-3-wiring entrypoint Story) production deploy (2026-05-13 09:22) 직후 사용자 NAS bucket 실측에서 발견된 5중 차단 cycle:

  1. **upbit L1 today=0** (WAL sealed 4,749 today + 13,810 모든 date 있음에도 partition 미생성)
  2. **transaction L2 자연 cadence 0** (manual 호출 success, `_run_l2` silent skip — KST→UTC date roll 시 어제 date 의 L1 결과 hit 0)
  3. **bucket 463 obj = bithumb orderbooksnapshot only** (52 sym, upbit 0 + transaction 0)
  4. **L1 backlog 76,200 → 79,427 (+3,227)** — compactor 처리 속도 < ingester ingestion 속도 (orderbookdepth 48,629 NotImplementedError stuck)
  5. **upbit/KRW-BTC orderbooksnapshot manual L2 OOM exit 137** (pyarrow `concat_tables.sort_by` 32GB memory limit + i32 offset 4GB overflow)

  본 Epic = MCT-156 의 sibling cycle (deployment 후 발견 cycle). 3 Story sequential 분해:

  - **MCT-162** (entrypoint): L1 channel parity + orderbookdepth schema 정의 (#1 + #4 root cause)
  - **MCT-160**: L2/L3 cadence + OOM + L1 backlog cleanup (#2 + #3 + #5 + #4 잔여)
  - **MCT-161**: NAS bucket versioning + replication (MCT-153 손실 재발 방지)


  bucket `mctrader-market` = 4.2 GiB / 1370 obj 만 존재, `tier=L3/` prefix 0개, `tier=L2/` 안 `hour=HH/` partition 0개.
  실측 객체는 MCT-153 backfill 1회 산출물 only (legacy ADR-009 §D2.1 layout, hour 부재).
  본 Epic = hot pipeline NAS endpoint routing 활성화 + DualWriter primitive inject + legacy MinioUploader deprecation.


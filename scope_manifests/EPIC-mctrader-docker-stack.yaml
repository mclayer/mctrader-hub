epic_key: EPIC-mctrader-docker-stack
epic_title: "mctrader Docker stack 확장 — collector + paper-engine + backtest profile + observability + WAL measurement"
parent_dependency: []
status: phase:요구사항-PLANNED
created: 2026-05-15
brainstorm_session: 2026-05-15 (Phase 0 verify + Phase 1 codeforge-brainstorm + 3 pass Codex review)
brainstorm_phase0_agents: [DomainAgent, ResearcherAgent, RequirementsAnalystAgent, PMOAgent]
codex_review:
  pass_1: "2026-05-15 — 6 결정점 (D1-D6 infrastructure)"
  pass_2: "2026-05-15 — 6 결정점 (D7-D12 wiring)"
  pass_3: "2026-05-15 — 7 결정점 (D13-D19 detail)"
  total_decisions: 19
  story_count: 7

motivation: |
  mctrader-hub/compose.yml 에 누락된 어플리케이션 서비스 (mctrader-data collector + mctrader-engine
  paper-engine + backtest-runner) 를 추가해 single-host Docker stack 으로 전 mode (backtest/paper/live)
  를 운영 가능하게 한다. 동시에 NAS MinIO (prod) ↔ hub MinIO (dev) profile 전환, observability
  (Prometheus + Grafana + alert), WAL 30G production measurement (EPIC-tier-promotion CLOSED prereq),
  integration smoke (compose CI) 를 통합한다.

  배경:
  - 현 compose.yml = postgres + minio + redis + mc-init 4 service 만 정의. 어플리케이션 (data/engine)
    은 compose 외부에서 별도 실행 → operational ambiguity + dev/prod parity 부재
  - EPIC-tier-promotion-single-source 의 R-CRITICAL (WAL 30G 가설 미측정, 50sym×3ch×12seg/h ±50%)
    이 production 운영 진입의 blocker. 본 Epic 의 MCT-179 가 measurement 책임
  - codeforge-plugin#620 post-mortem Fix-2 (compose CI gate) 의 mctrader-consumer 측 구현

design_decisions:
  # ─── Infrastructure 결정 (D1-D6, 1st pass Codex) ───
  D1:
    decision: "WAL host disk 별도 mount + L1 named volume"
    option_chosen: C
    rationale: "WAL = host disk bind mount (forward-only invariant + 손실 시 영구 손실 risk 명시) / L1 = named volume (compose lifecycle 정합). 4 layer capacity (D11 from EPIC-tier-promotion) 정합"
    owner_story: MCT-175
  D2:
    decision: "paper-engine daemon + backtest-runner profile [oneshot] 동일 image command override"
    option_chosen: A
    rationale: "image build 1회 → command 분기. paper = restart unless-stopped daemon / backtest = profile + oneshot. dev/prod parity"
    owner_story: MCT-177 + MCT-178
  D3:
    decision: "compose profiles dev/prod + env_file 분리 (.env.dev / .env.prod)"
    option_chosen: A
    rationale: "dev = hub MinIO + paper / prod = NAS MinIO + paper+live. profile + env_file 두 축으로 분리"
    owner_story: MCT-175
  D4:
    decision: "SIGTERM handler + 60s grace + start-time invariant check"
    option_chosen: C
    rationale: "graceful drain (WAL flush + sealed segment 완료 대기) + 시작 시 InvariantHarness 8종 scan (D17 정합)"
    owner_story: MCT-177 + MCT-179
  D5:
    decision: "Prometheus metric + measurement script + amendment trigger (WAL 30G hypothesis verify)"
    option_chosen: C
    rationale: "EPIC-tier-promotion R-CRITICAL carry over 해소. peak market open 09:00 KST 1h burst window 측정 + 30G 초과 시 D11 hard_limit amendment 발의"
    owner_story: MCT-179
  D6:
    decision: "7 Story 분해 (MCT-175 ~ MCT-181)"
    option_chosen: B
    rationale: "infrastructure (175) → collector (176) → paper-engine (177) → backtest profile (178) → observability+WAL (179) → integration smoke (180) → Epic 박제 (181) sequential chain"
    owner_story: epic-level

  # ─── Wiring 결정 (D7-D12, 2nd pass Codex) ───
  D7:
    decision: "DNS 직접 해석 (preflight 검증 의무)"
    option_chosen: A
    rationale: "NAS MinIO endpoint = mcnas01.internal.mclayer.it:9000 직접 해석. compose preflight 에 nslookup 검증 의무 + .env.prod 의 endpoint 변경 시 fail-fast"
    owner_story: MCT-175 + MCT-176
  D8:
    decision: "앱 내장 /metrics + Grafana dashboard + alert rule"
    option_chosen: C
    rationale: "collector + paper-engine + backtest-runner 모두 :9090/metrics expose (mctrader_* + nas_reader_* + nas_reader_ambiguity_total 등) + Grafana dashboard + Prometheus alert rule (>80% capacity warn)"
    owner_story: MCT-179
  D9:
    decision: ".env 패턴 유지 + rotate-nas-credentials.sh + cron + Slack"
    option_chosen: D
    rationale: "secret manager 도입 cost 회피 (1-host 환경). .env 파일 + 90d rotation 스크립트 + cron schedule + Slack 알림. compose 재시작 = secret 갱신 vehicle"
    owner_story: MCT-176
  D10:
    decision: "env default + compose command override 둘 다"
    option_chosen: D
    rationale: "universe 50-sym list = .env.example 의 default (MCT-103) + compose command 의 --universe-id 로 case-specific override (backtest = subset universe 가능)"
    owner_story: MCT-177 + MCT-178
  D11:
    decision: "compose CI smoke + testcontainers 병행"
    option_chosen: C
    rationale: "compose CI = stack-level smoke (postgres+minio+redis 정합) / testcontainers = repo-level unit (collector→NAS 단위). 두 layer 모두 gate"
    owner_story: MCT-180
  D12:
    decision: "semver + sha + latest 병행 (prod = sha/release pin, dev = latest)"
    option_chosen: B
    rationale: "prod = release tag (v1.x.x) + git sha pin + dev = latest (rapid iteration). image registry = ghcr.io/mclayer/{repo}:{tag}"
    owner_story: MCT-181

  # ─── Detail 결정 (D13-D19, 3rd pass Codex) ───
  D13:
    decision: "각 repo 독립 uv.lock + CI gate (cross-repo lock-version constraint check)"
    option_chosen: D
    rationale: "monorepo lock 회피 (4 repo 독립 lifecycle) + CI gate 로 cross-repo Python/major lib version drift 차단"
    owner_story: MCT-175
  D14:
    decision: "env override + YAML default (effective config 출력 의무)"
    option_chosen: D
    rationale: "각 컨테이너 시작 시 effective config (env↔YAML 우선순위 표기) 를 stdout 로 dump → log SoT. 정합성 검증 의무"
    owner_story: MCT-176
  D15:
    decision: "Redis key prefix (signal:/market:/engine:)"
    option_chosen: C
    rationale: "namespace 분리 + key collision 방지. flush 시 prefix 단위 partial flush 가능"
    owner_story: MCT-177
  D16:
    decision: "docker compose config lint + compose up --wait health gate"
    option_chosen: B
    rationale: "PR CI = compose config (syntax) + compose up --wait (healthcheck pass) 2단계 gate"
    owner_story: MCT-178
  D17:
    decision: "SIGTERM graceful + startup InvariantHarness scan (외부 backup 없이)"
    option_chosen: A
    rationale: "host disk 손실 risk 수용 (forward-only invariant + NAS = L1+ SoT). 외부 backup 도입 cost 회피"
    owner_story: MCT-179
    risk_note: "host disk 손실 시 WAL local segment 영구 손실 → L1 NAS PUT 직전 segment 만 RPO ≠ 0 window. D5 ingest block 으로 mitigation"
  D18:
    decision: "명시 resource limits + Prometheus alert (>80% warn)"
    option_chosen: D
    rationale: "compose deploy.resources.limits (CPU + memory) 명시 + Prometheus container_memory_usage_bytes > 80% warn alert. 4 layer capacity 정합"
    owner_story: MCT-180
  D19:
    decision: "mctrader_runs named volume + NAS sync on completion"
    option_chosen: C
    rationale: "backtest 결과 artifact = mctrader_runs named volume (compose lifecycle) + 완료 후 NAS sync (별 prefix tier=runs/). completion marker + retry on fail"
    owner_story: MCT-181
    risk_note: "NAS sync 실패 시 local↔remote 갈림 → completion marker file + 3회 retry + alert"

# ─── 19 D ↔ 7 Story 통합 매트릭스 (PMO finalize) ───

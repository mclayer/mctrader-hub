epic_key: EPIC-data-domain-decoupling
epic_title: "Data Domain Decoupling — 4-Layer 다중거래소 확장 아키텍처 (engine = data-free + exchange-agnostic pure consumer)"
parent_dependency: []
status: phase:요구사항-PLANNED
created: 2026-05-16
brainstorm_session: "2026-05-16 (Phase 0 deep-verify + codeforge-brainstorm + Codex review)"
brainstorm_phase0_agents: [DomainAgent, ResearcherAgent, RequirementsAnalystAgent, PMOAgent]
sequential: true
codex_review:
  total_decisions: 7
  story_count: 7

motivation: |
  mctrader-engine 을 (1) data-free (mctrader_data python 의존 0) + (2) exchange-agnostic
  pure consumer (mctrader_market_bithumb/upbit/* 어댑터 직접 의존 0) 로 전환한다.
  사용자 확정 = "전체 종착점 1 Epic, 단계적 sequential Story". 첫 요구 "신규 거래소 data
  단독 반영" 의 다중거래소 일반화.

  배경 (Phase 0 deep-verify 실증):
  - engine 이 mctrader_data python 직접 의존 (storage.scan_candles/orderbook_replay/
    path.resolve_data_root cold-read + io/ dead-in-prod reader 6 module) + mctrader_market_bithumb
    어댑터 직접 import ~5곳 (realtime WS 경로) → 거래소 추가 시 engine 변경 전파
  - aggregation(PURE market+stdlib) / TickRecord·OrderbookEventRecord(pyarrow 모듈 내
    순수 dataclass) / paper_lineage(PURE) / CandleModel(이미 mctrader_market.candle 존재)
    / engine io/ (src caller 0, tests/io/ 만, 미배선 dead-in-prod) 실증
  - market 은 mctrader_data 를 어디서도 import 안 함 (순환 0, DAG 최하위 FOUNDATION)
  - market 에 이미 exchange-neutral Protocol(CandleProvider/OrderBookProvider) 존재 +
    mctrader-market-upbit(v0.1.0) 존재 + data adapters.py 다중거래소 팩토리 존재
  - 4-Layer 목표: Layer0 market-core contract / Layer1 거래소 어댑터 repo / Layer2 data
    (storage+REST+stream) / Layer2' engine pure consumer

design_decisions:
  D1:
    decision: "Contract relocation → mctrader-market (Layer 0)"
    option_chosen: "relocate-to-market-core"
    rationale: "mctrader_data.aggregation(PURE, verified market+stdlib만) + TickRecord/OrderbookEventRecord 순수 dataclass 추출 + paper_lineage(PaperLineage/canonical_jsonl_hash PURE) → market-core 이전. CandleModel 은 이미 mctrader_market.candle 존재 → engine 4곳 import 경로 재지정만 (verified 2026-05-16 MCT-182 요구사항 lane, brainstorm 가설 5곳 정정 — docstring 오집계). data/engine 호출부 = deprecation re-export shim"
    owner_story: MCT-182
  D2:
    decision: "Read 도메인 relocation → mctrader-data (Layer 2)"
    option_chosen: "io-relocate + cold-read-behind-REST"
    rationale: "engine io/ (tier_reader/reader_cache/endpoint_router/dr_mode/cold_reader/l1_reader — verified engine src/ caller 0, tests/io/ 만, dead-in-prod) → mctrader-data 물리 이전. engine 실제 cold-read (mctrader_data.storage.scan_candles/orderbook_replay/path.resolve_data_root) → data REST 뒤로 cutover"
    owner_story: "MCT-183 (io relocate) + MCT-185 (cold-read cutover)"
  D3:
    decision: "data REST API 신규 (Layer 2) — historical + reverse-write + realtime stream"
    option_chosen: "fastapi-v1 + redis-stream"
    rationale: "data 에 api/ FastAPI 신규 (현 web framework 0, stdlib health_server 만). /v1 = historical (Arrow IPC streaming, presigned-NAS-handoff 기각 — engine 이 NAS 알면 안 됨) + 역방향 write POST (paper-candles/backtest-artifact) + 실시간 정규화 stream (Redis Stream — data 이미 redis[hiredis], ADR-030 single-host loopback, Milestone-2 tick.v1.1 패턴). OpenAPI SSOT = data repo 소유, engine = thin/generated client (mctrader_engine/data_client/). hub governance = schema snapshot (.codeforge/contracts) + cross-repo lock gate (ADR-030 D13 패턴 재사용)"
    owner_story: "MCT-184 (historical+reverse-write) + MCT-185 (realtime stream)"
  D4:
    decision: "engine exchange-adapter 제거"
    option_chosen: "subscribe-normalized-stream"
    rationale: "engine mctrader_market_bithumb 직접 import ~5곳 (paper_runner/ws_wrapper/stream_consumer/fill/mock_stream, realtime WS) 제거 → data 정규화 실시간 stream 구독 전환. engine 은 정규화 TickRowV1_1 (market-core contract) 소비 (bithumb-specific ws_events 아님)"
    owner_story: MCT-186
  D5:
    decision: "다중거래소 확장 불변식"
    option_chosen: "data-only-extension-invariant"
    rationale: "신규 거래소 = Layer1 어댑터 repo + data adapters.py 등록 (BithumbCandleProvider/UpbitCandleProvider 팩토리 이미 존재) + data 수집/정규화 설정. engine 변경 0, market-core 변경 0, ADR 0. 사용자 첫 요구 'data 단독 반영' 의 다중거래소 일반화"
    owner_story: MCT-187
  D6:
    decision: "ADR — ADR-031 신규 + ADR-029/027/030 amendment"
    option_chosen: "new-adr-031 + 3-amend"
    rationale: "ADR-031 신규 (Data Domain Decoupling — 4-layer + contract relocation + REST boundary + multi-exchange extensibility invariant). amendment: ADR-029 (engine NAS 직독 폐기, io reader relocated, NAS SoT 경로에 data REST indirection) / ADR-027 (io reader 6 module (endpoint_router/dr_mode/reader_cache/cold_reader/tier_reader/l1_reader) relocated to mctrader-data Layer2) / ADR-030 (compose topology — engine NAS cred drop, data api service 추가). MCT-179 lesson 정합 = ADR-031 Out-of-scope/D-row 전수 reconcile (cross-repo desync 누적 사전 차단)"
    owner_story: "MCT-182 (ADR-031 publish) + MCT-188 (POLICY_FINALIZED + amend confirm)"
  D7:
    decision: "data-free done-criterion (grep0 gate)"
    option_chosen: "ci-grep0-quad-gate"
    rationale: "engine src/ `from/import mctrader_data` == 0 AND engine pyproject mctrader-data 제거 AND engine src/ `mctrader_market_bithumb|upbit` == 0 AND engine pyproject 어댑터 의존 제거. CI gate 박제 (MCT-172 grep0 strict 패턴 재사용)"
    owner_story: MCT-188

# ─── 7 D ↔ 7 Story 통합 매트릭스 (PMO finalize, MCT-179 lesson — D-row ↔ Story owner 전수 1:1) ───

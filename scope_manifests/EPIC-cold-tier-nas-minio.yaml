# scope_manifest v1 — Epic A + Epic B (Cold Tier on NAS MinIO)
# Authored by PMOAgent (Phase 2), decided by Orchestrator.
# Brainstorm source: .tmp/brainstorm-cold-tier-nas-minio.md
# Plan source:       .tmp/plan-cold-tier-nas-minio.md

epic:
  key: EPIC-cold-tier-nas-minio
  title: "Cold Tier on NAS MinIO — Spike + Migration"
  why: "호스트 디스크 용량 부족 해소 — cold tier (L2/L3 compacted parquet) 를 외부 Synology NAS 위 MinIO 컨테이너로 이관. ADR-017 zero-loss invariant 보존."
  stages:
    - stage: 1
      label: "Feasibility Spike"
      stories: [MCT-147, MCT-148, MCT-149]
      gate: "ADR-027 Accepted + PoC 5종 검증 ALL-PASS evidence pack land"
      milestone: "Epic-cold-tier-stage-1-spike"
    - stage: 2
      label: "Cold Tier Migration"
      stories: [MCT-150, MCT-151, MCT-152, MCT-153, MCT-154, MCT-155]
      gate: "MCT-155 cutover MERGED + 3종 invariant 7일 PASS + engine NAS hit dashboard PASS"
      milestone: "Epic-cold-tier-stage-2-migration"
  prerequisites:
    - "ADR-017 zero-loss invariant 보존 (collector hot path / WAL / L1 = local 유지)"
    - "ADR-016 audit log immutability 별도 Epic 으로 분리 (이번 scope 외)"
    - "Synology NAS Container Manager 설치 + Docker package enabled"
    - "NAS 측 btrfs/ext4 volume 가용 (MinIO data dir 용)"
  out_of_scope:
    - "mctrader-web admin_audit.sqlite cold archive (별도 Epic, ADR-016 별도)"
    - "mctrader-market / market-bithumb / web 코드 변경"
    - "hot tick path / WAL 위치 변경 (ADR-017 보존)"

design_decisions:
  # 11 결정점 (D1~D11) — ADR-027 MCT-149 본문에 박제 의무
  - id: D1
    title: "Bucket layout"
    decision: "단일 'mctrader-market' bucket + Hive prefix (schema_version/exchange/node/tier/date)"
    rationale: "현 minio_uploader.py 와 정합 (BUCKET_NAME='mctrader-market' 하드코딩)"
  - id: D2
    title: "TLS / auth"
    decision: "Stage 1 = HTTP (LAN 내부망 + .env 0600 + 90일 rotation + NAS 방화벽 port 9000 mctrader 호스트 IP only). Stage 2 = TLS 재검토 (MCT-149 ADR-027 본문 작성 시 D2 wording 갱신 의무). credential = Container Manager .env (gitignored) + 90일 rotation runbook"
    rationale: "사용자 결정 (MCT-147 §6.0 D2 amend) — LAN 내부망 + Stage 1 인프라 한정 scope. 4중 mitigation (LAN 격리·방화벽·.env 0600·rotation) 으로 risk acceptable. Stage 2 escalation 의무 박제."
    amended_in: MCT-147
    amended_at: 2026-05-12
  - id: D3
    title: "ADR 형태"
    decision: "신규 ADR-027 신설 (ADR-017 amendment 아님)"
    rationale: "외부 NAS 배치·보안·cutover·GC 까지 별도 운영 아키텍처"
  - id: D4
    title: "Cutover 전략"
    decision: "dual-write window → 검증 통과 → reader endpoint 전환 → local GC"
    rationale: "write-then-rename 완료 후 NAS PUT, atomic switch 직전 검증"
  - id: D5
    title: "Failure mode"
    decision: "NAS unreachable 시 compactor 만 retry queue + backlog alert. WAL/L1/hot path 무영향"
    rationale: "scope = cold only. ADR-017 hot durability 보존"
  - id: D6
    title: "이관 검증 invariant"
    decision: "sha256 + object count + parquet row count 3종 ALL PASS"
    rationale: "ADR-009 16-col schema 검증, forward-only 일관성"
  - id: D7
    title: "Local GC"
    decision: "검증 후 7일 grace + dry-run 선행 → 실 삭제. 디스크 압박 시 tier/date 순차 GC"
    rationale: "data loss 방지 3중 lock"
  - id: D8
    title: "Spike scope"
    decision: "HTTP 200 health check / latency baseline / large PUT 50MB / restart idempotency / partial object visibility 5종 PoC (D2 amend 정합 — TLS handshake → HTTP health 로 amend)"
    rationale: "write-then-rename ↔ S3 PUT semantic 매핑 검증 + Synology Container Manager 가용성 검증. D2 Stage 1 HTTP 운영과 정합."
    amended_in: MCT-147
    amended_at: 2026-05-12
  - id: D9
    title: "Reader 측"
    decision: "mctrader-engine read-through cache (NAS = SoT, local = LRU/TTL cache)"
    rationale: "scope = cold only L2/L3, partition path 호환 유지"
  - id: D10
    title: "영향 repo"
    decision: "mctrader-data + mctrader-engine + mctrader-hub. market/market-bithumb/web 제외"
    rationale: "업로드 구현 위치 + reader 위치 + 인프라 위치"
  - id: D11
    title: "admin_audit.sqlite scope"
    decision: "본 epic 제외, 별도 epic"
    rationale: "sqlite WAL ↔ parquet cold archive 운영 모델 상이"

  # Stage 2 신규 결정 (12점) — Codex GPT-5 review + Sonnet decider + 사용자 confirm (S8/S12)
  # 박제 trail: .tmp/brainstorm-cold-tier-nas-minio-stage2.md §3 (Phase 1 review)
  - id: S1
    title: "Backfill partition close 기준"
    decision: "Collector flush barrier signal + closed-day scope (UTC midnight 이전 = backfill only, 당일 partition = dual-write 자연 수렴)"
    rationale: "라이브 append/backfill race 를 invariant 검증 전에 직접 차단"
    addressed_in: MCT-153
  - id: S2
    title: "L1 compaction quiesce 메커니즘"
    decision: "drain + barrier 필수 (dual-write toggle gate)"
    rationale: "toggle 이전 compaction output 이 local-only land 방지 — silent row loss 차단"
    addressed_in: [MCT-151, MCT-152]
  - id: S3
    title: "Reader cache invalidation barrier"
    decision: "explicit cache flush + verify before endpoint flip"
    rationale: "D4 reader cutover gate 와 가장 단순하게 부합. stale list/object cache → 404 spike 가 데이터 유실처럼 보이는 risk 차단"
    addressed_in: MCT-154
  - id: S4
    title: "PUT-If-None-Match / conditional write 지원"
    decision: "HEAD-then-PUT fallback + MCT-150 에서 MinIO conditional write smoke test 선행"
    rationale: "RELEASE.2025-04-08 정확한 동작은 smoke-test 선행 필요. 결정론적 D1 object key 동시 overwrite risk 차단"
    addressed_in: MCT-150
  - id: S5
    title: "Schema invariant 확장 (D6 보강)"
    decision: "D6 박제 3종 + column count + column name order + dtype identity + schema_version pin = 7종 invariant"
    rationale: "D6 PASS 이나 Parquet schema 차이로 read 파괴/오염 risk 차단 (reader-breaking drift 포착)"
    addressed_in: [MCT-151, MCT-153]
    triggers_adr_amendment:
      adr: ADR-027
      section: D6
      mandatory: true
      trigger_story: MCT-151
  - id: S6
    title: "Legacy node= 부재 partition backfill 시 NAS PUT path"
    decision: "NAS PUT 시 node=DEFAULT 명시 기재"
    rationale: "ADR-009 §D2.1 read mapping (DEFAULT 의미론) 정합. 부재 보존 시 두 가지 물리 레이아웃 → cutover legacy partition 누락 risk 차단"
    addressed_in: [MCT-153, MCT-154]
  - id: S7
    title: "Backfill chunking 단위"
    decision: "Per-(symbol, day) tuple, 10-symbol 병렬. 76GB ~7분 추정 (50MB×1520 PUT × p99 2871ms ÷ 10)"
    rationale: "Invariant 범위 이하 분절 없이 최적 재개성 + 병렬성. 너무 거친 a/c 거부, 과분절 b 거부"
    addressed_in: MCT-153
  - id: S8
    title: "RPO 강도 해석 (사용자 절대 유실 금지)"
    decision: "RPO=0 at cutover (cutover-1s 검증 L2 segment 모두 cutover+1s NAS 존재 의무)"
    rationale: "사용자 directive verbatim 정합 + ADR-027 D6 ALL-PASS invariant gate 정합. chunk-boundary loss 허용 (b) / session resync (c) 거부"
    addressed_in: [MCT-151, MCT-155]
    user_confirmed: true
    user_confirmed_at: 2026-05-12
  - id: S9
    title: "Cutover failure rollback 정책"
    decision: "Cutover 후 dual-write 7d 연장 (grace overlap, belt-and-suspenders)"
    rationale: "7d grace 동안 NAS 검증 유지 → 롤백 비용 최소화. NAS-only write window 발생 시 reverse sync 비용 차단"
    addressed_in: [MCT-154, MCT-155]
    triggers_adr_amendment:
      adr: ADR-027
      section: D4
      mandatory: false
      trigger_story: MCT-154
  - id: S10
    title: "NAS unreachable 운영 SOP"
    decision: "Auto-resume + Prometheus alert (1000 segments OR 10GB backlog threshold) + ADR-017 archive failure 7d grace tie-in. >24h 지속 unreachable 시만 user manual gate"
    rationale: "D5 retry queue 구체화. WAL+L1 unaffected 유지 (hot path invariant). user-confirm recovery 는 일상적 transient 복구 지연 risk → 거부"
    addressed_in: [MCT-150, MCT-152]
    triggers_adr_amendment:
      adr: ADR-027
      section: D5
      mandatory: false
      trigger_story: MCT-150
  - id: S11
    title: "dual-write disk I/O 정량 측정 baseline"
    decision: "Prometheus node_exporter + container metrics, MCT-150 pre + MCT-152 during"
    rationale: "비교 가능한 baseline + 활성화 delta 확보. iostat 단독은 story gate 로 취약"
    addressed_in: [MCT-150, MCT-152]
  - id: S12
    title: "Stage 2 TLS 재검토 timing (D2 escalation 의무)"
    decision: "HTTP 유지 (Stage 1 정책 연장) — Stage 2 cutover 후 MCT-155 재검토"
    rationale: "사용자 confirm — Stage 1 4중 mitigation (LAN-only + .env 0600 + 90d rotation + IP-allowlist firewall) 유지. cutover 중 TLS 활성화 = endpoint URL 변경 + dual-write invariant 재검증 강제 (disruptive)"
    addressed_in: [MCT-150, MCT-155]
    user_confirmed: true
    user_confirmed_at: 2026-05-12
    triggers_adr_amendment:
      adr: ADR-027
      section: D2
      mandatory: true
      trigger_story: MCT-155


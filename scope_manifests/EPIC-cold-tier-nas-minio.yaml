risk_register:
  - id: R1
    title: "NAS 가용성 SLA 부재"
    likelihood: medium
    impact: high
    mitigation:
      - "MCT-148 PoC 단계 restart-idempotency 5분 통과 확인"
      - "MCT-155 runbook: NAS down 시 MINIO_ENDPOINT local 복귀 절차 명시"
      - "MCT-150 Prometheus alert: minio_uploader_fail rate > 1/min → page"
  - id: R2
    title: "dual-write window 의 metric coverage 누락"
    likelihood: medium
    impact: high
    mitigation:
      - "MCT-151 invariant_checker 가 매 PUT 직후 3종 check, 불일치 시 alert + dual-write 자동 연장"
      - "MCT-150 metrics 4종 (success/fail/latency/queue_depth) 모두 dual-write path 통과"
  - id: R3
    title: "engine reader cache invalidation 실패 → stale read"
    likelihood: medium
    impact: medium
    mitigation:
      - "MCT-154 cache TTL 명시, NAS object ETag 기반 invalidation"
      - "MCT-154 integration test: NAS update → local cache stale 검출"
  - id: R4
    title: "L2/L3 migration 중단 시 partial state"
    likelihood: low
    impact: high
    mitigation:
      - "MCT-152 idempotent resume — manifest file 기반 chunk-by-chunk checkpoint"
      - "forward-only invariant — source 보존, target 미완 시 rerun 안전"
  - id: R5
    title: "GC 가 검증 전 데이터 삭제 (data loss)"
    likelihood: low
    impact: critical
    mitigation:
      - "MCT-153 dry-run flag 의무 + 7일 grace + invariant PASS gate 3중 lock"
      - "MCT-153 deletion log + 24h 지연 batch delete"
  - id: R6
    title: "Secret leak — MinIO credential"
    likelihood: low
    impact: high
    mitigation:
      - "MCT-147 runbook: credential 은 hub .env (gitignored) + ADR-008 secret management 준수"
      - "MCT-155 runbook: 90일 rotation cadence + audit log"
  - id: R7
    title: "Credential leak via HTTP 평문 전송 (Stage 1 D2 amend 후 재서술)"
    likelihood: medium
    impact: high
    mitigation:
      - "MCT-147 NAS 방화벽 port 9000 mctrader 호스트 IP only (LAN 격리)"
      - "MCT-147 .env 0600 + gitignored + 90일 rotation runbook"
      - "MCT-147 emergency rotation 절차 (credential leak 의심 시 즉시)"
      - "MCT-149 ADR-027 본문에서 Stage 2 (MCT-155) 진입 시 TLS 활성화 재검토 의무 박제"
    amended_in: MCT-147
    amended_at: 2026-05-12
  - id: R10
    title: "NAS 방화벽 룰 drift — port 9000 외부 노출 시 credential leak surface 확장"
    likelihood: low
    impact: critical
    mitigation:
      - "MCT-147 deploy runbook: 방화벽 룰 명시 (mctrader 호스트 IP only)"
      - "MCT-155 cutover 시 방화벽 룰 monitoring 의무 (NAS Container Manager UI 또는 cli check)"
      - "정기 audit: 90일 rotation 시점에 방화벽 룰 재검증"
    added_in: MCT-147
    added_at: 2026-05-12
  - id: R8
    title: "PoC 결과로 결정점 번복 시 ADR-027 rework"
    likelihood: medium
    impact: medium
    mitigation:
      - "MCT-149 진입 전 PMOAgent quick audit gate (MCT-148 evidence 검토)"
      - "번복 발생 시 brainstorm Phase 0 재실행"
  - id: R9
    title: "Phase 2 PR pair 와 spike Story 의 evidence reuse 충돌"
    likelihood: low
    impact: low
    mitigation:
      - "MCT-148 = spike 결과 박제 후 종료, MCT-150 Phase 2 evidence 와 분리"
      - "PMO 모니터"


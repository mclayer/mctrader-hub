# .claude/_overlay/project.yaml — mctrader-hub SSOT 상수
# Schema: https://github.com/mclayer/plugin-codeforge/blob/main/docs/project-config-schema.md

project:
  name: mctrader

# CFP-128 / ADR-033 — none (governance hub, no Docker artifacts)
infra_strategy: none

github:
  org: mclayer
  repo: mctrader-hub
  default_branch: main

  pr_title_prefix_template: "[{key}] {title}"

  # 단일 KEY prefix. mctrader 6 repo 전체가 본 hub 의 MCT-N 으로 cross-repo Story 추적.
  story_key_prefix: MCT

  codeowners:
    # mclayer org 에 team 미생성 (single-developer 단계). 향후 team 생성 시 갱신.
    architect_team: "@mccho8865"
    domain_expert_team: "@mccho8865"

  discussions:
    domain_kb_category: "Domain Q&A"

  milestone:
    epic_naming_pattern: "Epic-{key}-{slug}"

codeforge:
  stories:
    hub:
      key_pattern: "MCT-{seq:03d}"
      story_dir: docs/stories

    repo_key_pattern: "MCT-{seq:03d}"
    counters:
      path: .codeforge/counters.json
      lock: file

    repos:
      - name: mctrader-hub
        role: governance
        story_dir: docs/stories
        creates_repo_stories: false

      - name: mctrader-data
        role: implementation
        path: C:/workspace/mclayer/mctrader-data
        github: mclayer/mctrader-data
        story_dir: docs/stories
        components: [data, pipeline, storage]

      - name: mctrader-market
        role: implementation
        path: C:/workspace/mclayer/mctrader-market
        github: mclayer/mctrader-market
        story_dir: docs/stories
        components: [market, contracts]

      - name: mctrader-market-bithumb
        role: implementation
        path: C:/workspace/mclayer/mctrader-market-bithumb
        github: mclayer/mctrader-market-bithumb
        story_dir: docs/stories
        components: [market-bithumb, exchange]

      - name: mctrader-engine
        role: implementation
        path: C:/workspace/mclayer/mctrader-engine
        github: mclayer/mctrader-engine
        story_dir: docs/stories
        components: [engine, strategy, risk, executor]

      - name: mctrader-web
        role: implementation
        path: C:/workspace/mclayer/mctrader-web
        github: mclayer/mctrader-web
        story_dir: docs/stories
        components: [web, ui]

labels:
  components:
    # 6 repo (cross-repo Story labeling)
    - hub
    - market
    - market-bithumb
    - data
    - engine
    - web
    # Cross-cutting domain areas
    - contracts          # inter-repo schemas (Candle / Order / OrderBook / OHLCV)
    - risk               # kill switch / drawdown limit / max exposure
    - backtest           # backtest engine + slippage/fee/lookahead 모델
    - paper              # paper trading mode (실전가상)
    - live               # live trading mode + secret 관리

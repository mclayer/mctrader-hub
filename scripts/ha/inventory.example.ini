; Sample inventory for active-active rolling deploy.
; Copy to e.g. /etc/ansible/inventory/mctrader.ini and edit per cluster.
;
; node_id var → must match NODE_ID in /etc/mctrader/collector.env on the host.

[collectors]
node-a.example.com node_id=NODE_A
node-b.example.com node_id=NODE_B

[collectors:vars]
ansible_user=deploy
ansible_become=true

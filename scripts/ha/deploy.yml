---
# mctrader-data collector active-active rolling deploy.
#
# Codex F-2 PUSH-BACK fix: shared-storage `.deploy_lock` mkdir + `any_errors_fatal: true`
# prevents two concurrent deploy invocations from violating active-active coverage
# (single operator assumption is too weak for shared-storage active-active).
#
# Usage:
#   ansible-playbook -i inventory.ini scripts/ha/deploy.yml --check --diff   # dry-run
#   ansible-playbook -i inventory.ini scripts/ha/deploy.yml                  # production
#
# Inventory expectation:
#   [collectors]
#   node-a.example.com node_id=NODE_A
#   node-b.example.com node_id=NODE_B
#
# Refs:
#   docs/stories/MCT-89.md §6.2 (Phase 5 ops scope)
#   docs/superpowers/specs/2026-05-05-collector-ha-active-active-design.md §4.2

- name: mctrader-data collector rolling deploy
  hosts: collectors
  serial: 1
  any_errors_fatal: true
  become: true
  vars:
    deploy_lock: /mnt/shared/mctrader/.deploy_lock
    data_root: /mnt/shared/mctrader/data
    install_dir: /opt/mctrader
    service_name: mctrader-data-collector

  pre_tasks:
    # Acquire shared-storage lock (run_once: lock taken once for the entire batch).
    # POSIX mkdir is atomic on shared storage with same-directory atomic rename
    # guarantee (NFSv3 close-to-open / NFSv4 / Ceph same-pool / SMB v3).
    - name: Acquire shared deploy lock
      ansible.builtin.command:
        cmd: "mkdir {{ deploy_lock }}"
      register: lock_result
      failed_when: lock_result.rc != 0
      changed_when: lock_result.rc == 0
      run_once: true

    - name: Record lock owner (for stale-lock recovery)
      ansible.builtin.copy:
        dest: "{{ deploy_lock }}/owner"
        content: |
          host: {{ inventory_hostname }}
          time_iso: {{ ansible_date_time.iso8601 }}
          ansible_pid: {{ ansible_play_pid | default('unknown') }}
        mode: "0644"
      run_once: true

  tasks:
    # Pre-stop health gate — peer node must be green (heartbeat fresh + ws_state ok).
    # Failing here halts the rolling deploy (any_errors_fatal: true).
    - name: Verify peer heartbeat is green before stopping this node
      ansible.builtin.command:
        cmd: "mctrader-data status --root {{ data_root }} --format json --no-color"
      register: pre_status
      changed_when: false
      failed_when: pre_status.rc != 0

    - name: Stop collector
      ansible.builtin.systemd:
        name: "{{ service_name }}"
        state: stopped

    - name: Pull mctrader-data git working tree
      ansible.builtin.git:
        repo: "git@github.com:mclayer/mctrader-data.git"
        dest: "{{ install_dir }}/mctrader-data"
        version: main
      become_user: mctrader

    - name: uv pip sync (deps + mctrader-data wheel)
      ansible.builtin.command:
        cmd: "{{ install_dir }}/.venv/bin/uv pip install -e {{ install_dir }}/mctrader-data"
      become_user: mctrader

    - name: Start collector
      ansible.builtin.systemd:
        name: "{{ service_name }}"
        state: started

    # Post-start health gate — wait for self heartbeat green within 30s
    - name: Wait for self heartbeat green
      ansible.builtin.command:
        cmd: "mctrader-data status --root {{ data_root }} --format json --no-color --fresh-red-seconds 30"
      register: post_status
      changed_when: false
      retries: 6
      delay: 5
      until: post_status.rc == 0
      failed_when: post_status.rc != 0

  post_tasks:
    - name: Release shared deploy lock
      ansible.builtin.file:
        path: "{{ deploy_lock }}"
        state: absent
      run_once: true

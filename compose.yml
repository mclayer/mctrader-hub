# mctrader-hub/compose.yml — Shared infrastructure (EPIC-mctrader-docker-stack)
# Profile usage:
#   dev:  docker compose --profile dev --env-file .env.dev up
#   prod: docker compose --profile prod --env-file .env.prod up
# ADR-030 §D3 박제.
services:
  postgres:
    image: postgres:16-alpine
    container_name: mctrader-postgres
    environment:
      POSTGRES_DB: mctrader
      POSTGRES_USER: mctrader
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - mctrader_postgres:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/01-init-db.sh
    ports:
      - "5432:5432"
    networks:
      mctrader_net:
        aliases:
          - postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mctrader"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    labels:
      mctrader.role: "postgres"
      mctrader.story: "MCT-105"

  minio:
    image: quay.io/minio/minio:latest
    container_name: mctrader-minio
    profiles: ["dev"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - mctrader_minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      mctrader_net:
        aliases:
          - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    labels:
      mctrader.role: "minio"
      mctrader.story: "MCT-120"

  mc:
    image: quay.io/minio/mc:latest
    container_name: mctrader-mc-init
    profiles: ["dev"]
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - mctrader_net
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY &&
        mc mb --ignore-existing local/mctrader-market &&
        mc ilm add --expiry-days 365 local/mctrader-market &&
        echo '[mc-init] bucket init complete'
      "
    labels:
      mctrader.role: "mc-init"
      mctrader.story: "MCT-120"

  redis:
    image: redis:7-alpine
    container_name: mctrader-redis
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    volumes:
      - mctrader_redis:/data
    networks:
      mctrader_net:
        aliases:
          - redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    labels:
      mctrader.role: "redis"
      mctrader.story: "MCT-121"

  prometheus:
    image: prom/prometheus:latest
    container_name: mctrader-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - mctrader_prometheus:/prometheus
    networks:
      mctrader_net:
        aliases:
          - prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    labels:
      mctrader.role: "prometheus"
      mctrader.story: "MCT-123"

  grafana:
    image: grafana/grafana:latest
    container_name: mctrader-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - mctrader_grafana:/var/lib/grafana
    networks:
      mctrader_net:
        aliases:
          - grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    labels:
      mctrader.role: "grafana"
      mctrader.story: "MCT-123"

  postgres_exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    container_name: mctrader-postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://mctrader:${POSTGRES_PASSWORD}@postgres:5432/mctrader?sslmode=disable
    networks:
      - mctrader_net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    labels:
      mctrader.role: "postgres-exporter"
      mctrader.story: "MCT-123"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: mctrader-cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - mctrader_net
    restart: unless-stopped
    labels:
      mctrader.role: "cadvisor"
      mctrader.story: "MCT-123"

  node_exporter:
    image: prom/node-exporter:latest
    container_name: mctrader-node-exporter
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - mctrader_net
    restart: unless-stopped
    labels:
      mctrader.role: "node-exporter"
      mctrader.story: "MCT-123"

  signal-fear-greed:
    # container_name: mctrader-web signal_status.py/signal_control.py 가 "signal-fear-greed" 로 조회
    container_name: signal-fear-greed
    image: ghcr.io/mclayer/mctrader-signal-collector:latest
    build:
      context: ../mctrader-signal-collector
    command: ["python", "-m", "signal_collector.workers.fear_greed"]
    environment:
      - REDIS_URL=redis://redis:6379
    networks:
      - mctrader_net
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    labels:
      mctrader.role: "signal-fear-greed"
      mctrader.story: "MCT-124"

  signal-ecos:
    container_name: signal-ecos
    image: ghcr.io/mclayer/mctrader-signal-collector:latest
    build:
      context: ../mctrader-signal-collector
    command: ["python", "-m", "signal_collector.workers.ecos"]
    environment:
      - REDIS_URL=redis://redis:6379
      - ECOS_API_KEY=${ECOS_API_KEY}
    networks:
      - mctrader_net
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    labels:
      mctrader.role: "signal-ecos"
      mctrader.story: "MCT-124"

  signal-kimchi:
    container_name: signal-kimchi
    image: ghcr.io/mclayer/mctrader-signal-collector:latest
    build:
      context: ../mctrader-signal-collector
    command: ["python", "-m", "signal_collector.workers.kimchi_premium"]
    environment:
      - REDIS_URL=redis://redis:6379
    networks:
      - mctrader_net
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    labels:
      mctrader.role: "signal-kimchi"
      mctrader.story: "MCT-124"

  signal-announcement:
    container_name: signal-announcement
    image: ghcr.io/mclayer/mctrader-signal-collector:latest
    build:
      context: ../mctrader-signal-collector
    command: ["python", "-m", "signal_collector.workers.announcement"]
    environment:
      - REDIS_URL=redis://redis:6379
    networks:
      - mctrader_net
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    labels:
      mctrader.role: "signal-announcement"
      mctrader.story: "MCT-124"

  signal-coinglass:
    container_name: signal-coinglass
    image: ghcr.io/mclayer/mctrader-signal-collector:latest
    build:
      context: ../mctrader-signal-collector
    command: ["python", "-m", "signal_collector.workers.coinglass"]
    environment:
      - REDIS_URL=redis://redis:6379
      - COINGLASS_API_KEY=${COINGLASS_API_KEY}
    networks:
      - mctrader_net
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    labels:
      mctrader.role: "signal-coinglass"
      mctrader.story: "MCT-124"

  # mctrader-data collector — MCT-176 LAND 시 활성화
  # collector:
  #   image: ghcr.io/mclayer/mctrader-data:latest
  #   container_name: mctrader-collector
  #   profiles: ["dev", "prod"]
  #   build:
  #     context: ../mctrader-data
  #   env_file:
  #     - .env.${COMPOSE_PROFILES:-dev}
  #   volumes:
  #     - /var/lib/mctrader/wal:/var/lib/mctrader/data  # ADR-030 §D1 host bind mount
  #     - mctrader_l1:/var/lib/mctrader/data/l1
  #   ...
  # volumes:
  #   mctrader_l1:

  nginx:
    image: nginx:alpine
    container_name: mctrader-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.prod.conf:ro
    ports:
      - "80:80"
    networks:
      - mctrader_net
    depends_on:
      - grafana
      - prometheus
      # minio depends_on 제거 (prod profile 에서 부재 — ADR-030 §D3)
    restart: unless-stopped
    labels:
      mctrader.role: "nginx"

networks:
  mctrader_net:
    name: mctrader_net
    driver: bridge

volumes:
  mctrader_postgres:
  mctrader_minio:
  mctrader_redis:
  mctrader_prometheus:
  mctrader_grafana:

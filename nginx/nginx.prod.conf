# mctrader-hub/nginx/nginx.prod.conf — prod profile placeholder
#
# MCT-181 LAND 시 NAS-aware upstream 갱신 의무.
# 현재는 dev nginx.conf 사본 (placeholder option A 채택, Plan §2.1.2 amend).
# - prod 환경에서는 minio service 부재 → minio.mctrader.mclayer.it server block 제거 또는
#   NAS MinIO Console (mcnas01.internal.mclayer.it:9001) 로 redirect 갱신 의무.
# - MCT-175 scope = compose.yml bind mount 경로 충족용 placeholder 만 박제.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # grafana.mctrader.mclayer.it → Grafana :3000
    server {
        listen 80;
        server_name grafana.mctrader.mclayer.it;

        location / {
            proxy_pass         http://grafana:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # prometheus.mctrader.mclayer.it → Prometheus :9090
    server {
        listen 80;
        server_name prometheus.mctrader.mclayer.it;

        location / {
            proxy_pass       http://prometheus:9090;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # minio.mctrader.mclayer.it → MinIO Console :9001
    # NOTE (MCT-181 carry over): prod 환경에서는 minio service 부재.
    # NAS MinIO Console (mcnas01.internal.mclayer.it:9001) upstream 으로 갱신 의무.
    server {
        listen 80;
        server_name minio.mctrader.mclayer.it;

        location / {
            proxy_pass         http://minio:9001;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # mctrader.mclayer.it (default) → Streamlit :8501
    server {
        listen 80 default_server;
        server_name mctrader.mclayer.it;

        location / {
            proxy_pass         http://panel:8501;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}

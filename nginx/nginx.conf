worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # grafana.mctrader.mclayer.it → Grafana :3000
    server {
        listen 80;
        server_name grafana.mctrader.mclayer.it;

        location / {
            proxy_pass         http://grafana:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # prometheus.mctrader.mclayer.it → Prometheus :9090
    server {
        listen 80;
        server_name prometheus.mctrader.mclayer.it;

        location / {
            proxy_pass       http://prometheus:9090;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # minio.mctrader.mclayer.it → MinIO Console :9001
    server {
        listen 80;
        server_name minio.mctrader.mclayer.it;

        location / {
            proxy_pass         http://minio:9001;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # mctrader.mclayer.it (default) → Streamlit :8501
    server {
        listen 80 default_server;
        server_name mctrader.mclayer.it;

        location / {
            proxy_pass         http://panel:8501;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: postgres
    static_configs:
      - targets: [postgres_exporter:9187]

  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]
    metrics_path: /metrics

  - job_name: node
    static_configs:
      - targets: [node_exporter:9100]

  - job_name: mctrader-data-ingester-bithumb
    static_configs:
      - targets: [mctrader-ingester-bithumb:8080]
    metrics_path: /metrics

  - job_name: mctrader-data-compactor
    static_configs:
      - targets: [mctrader-compactor:8080]
    metrics_path: /metrics

  - job_name: mctrader-collector
    static_configs:
      - targets: [mctrader-collector:8080]
    metrics_path: /metrics

  - job_name: mctrader-engine-paper
    static_configs:
      - targets: [mctrader-paper-engine:8080]
    metrics_path: /metrics

  - job_name: signal-fear-greed
    static_configs:
      - targets: [signal-fear-greed:9200]
    metrics_path: /metrics

  - job_name: signal-ecos
    static_configs:
      - targets: [signal-ecos:9200]
    metrics_path: /metrics

  - job_name: signal-kimchi
    static_configs:
      - targets: [signal-kimchi:9200]
    metrics_path: /metrics

  - job_name: signal-announcement
    static_configs:
      - targets: [signal-announcement:9200]
    metrics_path: /metrics

  - job_name: signal-coinglass
    static_configs:
      - targets: [signal-coinglass:9200]
    metrics_path: /metrics

  - job_name: mctrader-web
    static_configs:
      - targets: ['mctrader-web-api:7821']
    metrics_path: /metrics
    scrape_interval: 15s
